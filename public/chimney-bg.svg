<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cbsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0410"/>
      <stop offset="40%" stop-color="#1a0808"/>
      <stop offset="70%" stop-color="#3d1200"/>
      <stop offset="100%" stop-color="#7a2800"/>
    </linearGradient>
    <linearGradient id="cbroof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a0e"/>
      <stop offset="100%" stop-color="#140a04"/>
    </linearGradient>
    <linearGradient id="cbchimney" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a0f08"/>
      <stop offset="50%" stop-color="#2d1a0a"/>
      <stop offset="100%" stop-color="#140a04"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes cbrise{0%{transform:translateY(0);opacity:0.5}100%{transform:translateY(-60px);opacity:0}}
    @keyframes cbrise2{0%{transform:translateY(0) translateX(0);opacity:0.4}100%{transform:translateY(-80px) translateX(15px);opacity:0}}
    @keyframes cbtwinkle{0%,100%{opacity:0.3}50%{opacity:1}}
    @keyframes cbember1{0%{transform:translate(0,0);opacity:1}100%{transform:translate(20px,-40px);opacity:0}}
    @keyframes cbember2{0%{transform:translate(0,0);opacity:1}100%{transform:translate(-15px,-50px);opacity:0}}
    @keyframes cbfl1{0%,100%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(1.1) scaleY(1.15)}}
    @keyframes cbfl2{0%,100%{transform:scaleX(1) scaleY(1)}33%{transform:scaleX(0.9) scaleY(1.2)}}
    .cbsmoke1{animation:cbrise 3s ease-out infinite}
    .cbsmoke2{animation:cbrise2 4s 1.5s ease-out infinite}
    .cbsmoke3{animation:cbrise 3.5s 2s ease-out infinite}
    .cbfl1{transform-origin:340px 248px;animation:cbfl1 0.5s ease-in-out infinite}
    .cbfl2{transform-origin:340px 245px;animation:cbfl2 0.6s 0.1s ease-in-out infinite}
    .cbem1{animation:cbember1 1.5s 0.3s ease-out infinite}
    .cbem2{animation:cbember2 1.8s 0.8s ease-out infinite}
    .cbem3{animation:cbember1 1.2s 0.1s ease-out infinite}
    .cbstar{animation:cbtwinkle 2s ease-in-out infinite}
  </style>
  <rect width="680" height="520" fill="url(#cbsky)"/>
  <circle cx="80" cy="40" r="1.5" fill="#fff" opacity="0.6" class="cbstar"/>
  <circle cx="150" cy="25" r="1" fill="#fff" opacity="0.5" style="animation:cbtwinkle 2.5s ease-in-out infinite"/>
  <circle cx="220" cy="55" r="1.5" fill="#fff" opacity="0.7" style="animation:cbtwinkle 1.8s 0.7s ease-in-out infinite"/>
  <circle cx="50" cy="80" r="1" fill="#fff" opacity="0.4" style="animation:cbtwinkle 3s ease-in-out infinite"/>
  <circle cx="600" cy="30" r="1.5" fill="#fff" opacity="0.6" style="animation:cbtwinkle 2.2s ease-in-out infinite"/>
  <circle cx="550" cy="60" r="1" fill="#fff" opacity="0.5" style="animation:cbtwinkle 1.6s ease-in-out infinite"/>
  <circle cx="480" cy="20" r="2" fill="#fff" opacity="0.8" style="animation:cbtwinkle 2.8s ease-in-out infinite"/>
  <circle cx="570" cy="75" r="25" fill="#C9A96E" opacity="0.85"/>
  <circle cx="580" cy="80" r="28" fill="#1a0808" opacity="0.5"/>
  <ellipse cx="340" cy="480" rx="180" ry="60" fill="#FF4500" opacity="0.25"/>
  <ellipse cx="340" cy="490" rx="120" ry="40" fill="#FF8C42" opacity="0.3"/>
  <rect x="0" y="380" width="680" height="140" fill="#0a0404"/>
  <rect x="20" y="350" width="15" height="35" fill="#0e0606"/>
  <rect x="45" y="330" width="25" height="55" fill="#0e0606"/>
  <rect x="80" y="345" width="18" height="40" fill="#0e0606"/>
  <rect x="110" y="320" width="30" height="65" fill="#0e0606"/>
  <rect x="560" y="340" width="22" height="45" fill="#0e0606"/>
  <rect x="595" y="320" width="35" height="65" fill="#0e0606"/>
  <rect x="635" y="350" width="18" height="35" fill="#0e0606"/>
  <rect x="115" y="330" width="5" height="4" fill="#FF8C42" opacity="0.6"/>
  <rect x="125" y="330" width="5" height="4" fill="#FF8C42" opacity="0.4"/>
  <rect x="600" y="330" width="5" height="4" fill="#FF8C42" opacity="0.6"/>
  <polygon points="100,420 580,420 620,380 60,380" fill="url(#cbroof)"/>
  <polygon points="60,380 620,380 580,370 100,370" fill="#1a0a04"/>
  <rect x="310" y="250" width="60" height="135" fill="url(#cbchimney)"/>
  <rect x="305" y="242" width="70" height="14" fill="#1a0f08"/>
  <path d="M324,248 Q328,232 340,224 Q352,232 356,248Z" fill="#FF4500" opacity="0.9" class="cbfl1"/>
  <path d="M328,248 Q333,236 340,230 Q347,236 352,248Z" fill="#FF8C42" class="cbfl2"/>
  <path d="M333,248 Q337,240 340,237 Q343,240 347,248Z" fill="#FFD166" opacity="0.9"/>
  <ellipse cx="340" cy="248" rx="14" ry="5" fill="#FF4500" opacity="0.6"/>
  <circle cx="338" cy="238" r="2" fill="#FF8C42" class="cbem1"/>
  <circle cx="343" cy="235" r="1.5" fill="#FFD166" class="cbem2"/>
  <circle cx="337" cy="240" r="2" fill="#FF4500" class="cbem3"/>
  <ellipse cx="332" cy="220" rx="16" ry="11" fill="#2a2a2a" opacity="0.3" class="cbsmoke1"/>
  <ellipse cx="348" cy="190" rx="20" ry="13" fill="#333" opacity="0.2" class="cbsmoke2"/>
  <ellipse cx="328" cy="165" rx="26" ry="15" fill="#444" opacity="0.15" class="cbsmoke3"/>
  <rect x="0" y="415" width="680" height="105" fill="#060202"/>
  <polygon points="0,380 680,380 680,415 0,415" fill="#080303"/>
</svg>
